<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelPulse Pro - AI Viral Script Generator</title>
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00f2fe;
            --dark: #0f111a;
            --card-bg: #1e2235;
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; background: var(--card-bg); border-radius: 16px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 5px; color: transparent; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; }
        .subtitle { text-align: center; font-size: 0.9rem; opacity: 0.8; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.95rem; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #131622; color: var(--text); font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(255, 0, 85, 0.4); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; border-radius: 8px; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,0,85,0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,242,254,0.4); }
        .output-box { display: none; margin-top: 25px; background: #131622; border-radius: 10px; padding: 20px; border-left: 4px solid var(--primary); position: relative; }
        .result-text { font-size: 1rem; line-height: 1.6; white-space: pre-line; word-wrap: break-word; }
        .copy-btn { margin-top: 15px; padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 0.9rem; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .copy-btn:hover { background: var(--text); color: var(--dark); }
        .ad-banner { width: 100%; max-width: 650px; height: 90px; background: #1a1e2e; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 8px; border: 1px dashed rgba(255,255,255,0.2); margin: 10px 0; color: #7f8c8d; }
        .blog-links { width: 100%; max-width: 650px; text-align: center; font-size: 0.9rem; margin-top: 20px; }
        .blog-links a { color: var(--secondary); text-decoration: none; margin: 0 10px; font-weight: 500; }
        .blog-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Top Ad Banner -->
    <div class="ad-banner">
        [Top Ad Banner - Paste Your AdSense Code Here]
    </div>

    <div class="container">
        <h1>🎬 ReelPulse Pro</h1>
        <div class="subtitle">Get Viral Scripts, Captions & Hashtags in 5 Seconds</div>

        <div class="form-group">
            <label for="topic">Topic / Niche Dalein:</label>
            <input type="text" id="topic" placeholder="e.g., Online Paise Kaise Kamaye, Gym Motivation...">
        </div>

        <div class="form-group">
            <label for="platform">Platform Chunein:</label>
            <select id="platform">
                <option value="Instagram Reels">Instagram Reels</option>
                <option value="YouTube Shorts">YouTube Shorts</option>
            </select>
        </div>

        <div class="form-group">
            <label for="tone">Video ki Vibe/Tone:</label>
            <select id="tone">
                <option value="Energetic & Fast-paced">Energetic & Fast-paced</option>
                <option value="Informative & Educational">Informative & Educational</option>
                <option value="Motivational & Deep">Motivational & Deep</option>
            </select>
        </div>

        <button class="btn" id="generateBtn" onclick="generateContent()">🚀 Generate Content</button>

        <div class="output-box" id="output">
            <div class="result-text" id="result-content"></div>
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy All</button>
        </div>
    </div>

    <!-- Bottom Links -->
    <div class="blog-links">
        📖 Humare Best Blog Posts Padhein:<br><br>
        <a href="#" target="_blank">🔗 Online Paise Kaise Kamayein?</a> | 
        <a href="#" target="_blank">🔗 Ghar Bainte Viral Content Kaise Banayein?</a>
    </div>

    <!-- Bottom Ad Banner -->
    <div class="ad-banner" style="margin-top: 25px;">
        [Bottom Ad Banner - Paste Your AdSense Code Here]
    </div>

    <script src="script.js"></script>
</body>
</html>
